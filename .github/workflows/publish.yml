name: Publish Image

on:
  workflow_dispatch:
  schedule:
    - cron: 0 2 * * *
      timezone: Europe/Berlin

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Prepare production environment
        run: |
          tee --append .env <<'EOF' >/dev/null
          # Drizzle
          DATABASE_URL=${{ secrets.DEPLOY_DB_PATH }}

          ORIGIN="${{ secrets.DEPLOY_ORIGIN }}"

          # Better Auth
          BETTER_AUTH_SECRET="${{ secrets.DEPLOY_BETTER_AUTH }}"

          # GitHub OAuth
          GITHUB_CLIENT_ID="${{ secrets.DEPLOY_OAUTH_ID }}"
          GITHUB_CLIENT_SECRET="${{ secrets.DEPLOY_OAUTH_SECRET }}"
          EOF

      # Use custom build workflow
      - uses: ./.github/workflows/build.yml
        with:
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

  publish:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Log in to the Container registry
        uses: docker/login-action@v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Docker image to Container registry
        id: push
        run: |
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          docker buildx imagetools inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }} >> "$GITHUB_OUTPUT"

      # This step generates an artifact attestation for the image, which is an
      # unforgeable statement about where and how it was built. It increases supply
      # chain security for people who consume the image.
      - name: Generate artifact attestation
        uses: actions/attest@v4.1.0
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME}}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
