services:
  # Nginx Reverse Proxy
  rp:
    image: nginx:1.31.2@sha256:ec4ed8b5299e5e90694af7750eb6dffd2627317d30544d056b0371f8082f7bce
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx:/etc/nginx
    depends_on:
      - th
    restart: unless-stopped

  th:
    build:
      context: .
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped
