# NOTE: All `:Z,U` flags on bind-mounted volumes
#       can be safely removed on systems running
#       docker-compose. These flags are used for
#       podman-compose systems to update access
#       permissions for the filesystem. See:
#       https://docs.podman.io/en/v4.4/markdown/options/volume.html

services:
  # Nginx Reverse Proxy
  rp:
    image: nginx:1.29.6@sha256:dec7a90bd0973b076832dc56933fe876bc014929e14b4ec49923951405370112
    ports:
      - '8080:80'
      - '8443:443'
    volumes:
      - ./nginx:/etc/nginx:z
    depends_on:
      - th
    restart: unless-stopped

  th:
    build:
      context: .
    volumes:
      - ./data:/app/data:z
      - ./logs:/app/logs:z
    restart: unless-stopped
