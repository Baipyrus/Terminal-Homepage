services:
  # Nginx Reverse Proxy
  rp:
    image: nginx:1.31.1@sha256:5aca99593157f4ae539a5dec1092a0ad8762f8e2eb1789085a13a0f5622369f6
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx:/etc/nginx
    depends_on:
      - th
    restart: unless-stopped

  th:
    build:
      context: .
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped
