services:
  # Nginx Reverse Proxy
  rp:
    image: nginx:1.31.0@sha256:800e7c98538c6bf725f5177e841aa720ae0ed1c378bbea368b6330bfe18a36b3
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx:/etc/nginx
    depends_on:
      - th
    restart: unless-stopped

  th:
    build:
      context: .
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped
